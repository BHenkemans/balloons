version: v2
plugins:
  - local: protoc-gen-go
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt:
      - paths=source_relative
  - local: ./web/node_modules/.bin/protoc-gen-es
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=js
