syntax = "proto3";

package balloons.v1;

option go_package = "github.com/BHenkemans/balloons/gen/balloons/v1;balloonsv1";

service BalloonService {
  rpc ListBalloons(ListBalloonsRequest) returns (ListBalloonsResponse) {}
  rpc StreamBalloons(StreamBalloonsRequest) returns (stream StreamBalloonsResponse) {}
  rpc MarkDone(MarkDoneRequest) returns (MarkDoneResponse) {}
}

message Balloon {
  int64 id = 1;
  string problem_label = 2;
  string problem_rgb = 3;
  string team_name = 4;
  bool done = 5;
  bool first_solve = 6;
}

message ListBalloonsRequest {}

message ListBalloonsResponse {
  repeated Balloon balloons = 1;
}

message StreamBalloonsRequest {}

message StreamBalloonsResponse {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_ADDED = 1;
    KIND_UPDATED = 2;
  }
  Kind kind = 1;
  Balloon balloon = 2;
}

message MarkDoneRequest {
  int64 balloon_id = 1;
}

message MarkDoneResponse {}
