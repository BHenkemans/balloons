<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Mark Balloon Delivered</title>
        <link rel="stylesheet" href="/dist/styles.css" />
        <script>
            (function () {
                try {
                    if (localStorage.getItem("theme") === "light") {
                        document.documentElement.classList.add("light");
                    }
                } catch (_) {}
            })();
        </script>
    </head>
    <body
        class="min-h-screen bg-zinc-950 text-zinc-100 light:bg-zinc-50 light:text-zinc-900"
    >
        <main class="mx-auto flex min-h-screen max-w-md flex-col px-5 py-8">
            <div id="loading" class="flex flex-1 items-center justify-center">
                <p class="text-zinc-400 light:text-zinc-500">Loading ticket…</p>
            </div>

            <div id="error" class="hidden flex-1 flex-col items-center justify-center text-center">
                <div class="mb-3 text-5xl">⚠️</div>
                <h1 class="mb-2 text-xl font-bold" id="error-title">Something went wrong</h1>
                <p class="text-sm text-zinc-400 light:text-zinc-500" id="error-detail"></p>
            </div>

            <div id="ticket" class="hidden flex-1 flex-col">
                <div
                    id="status-card"
                    class="mb-6 rounded-2xl border px-5 py-6 text-center"
                >
                    <div id="status-icon" class="mb-2 text-5xl">✓</div>
                    <h1 id="status-title" class="text-2xl font-bold">Delivered!</h1>
                    <p id="status-sub" class="mt-1 text-sm opacity-80"></p>
                </div>

                <div
                    class="mb-6 flex items-center gap-4 rounded-xl border border-zinc-800 bg-zinc-900/40 px-4 py-4 light:border-zinc-200 light:bg-white"
                >
                    <div
                        id="balloon-circle"
                        class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full text-xl font-bold text-white shadow ring-1 ring-black/20"
                    >?</div>
                    <div class="min-w-0 flex-1">
                        <div class="text-xs uppercase tracking-wider text-zinc-500 light:text-zinc-400">Problem</div>
                        <div id="problem-name" class="text-base font-semibold">—</div>
                        <div id="team-name" class="mt-1 truncate text-sm text-zinc-300 light:text-zinc-600">—</div>
                        <div id="first-solve-tag" class="mt-1 hidden text-xs font-semibold text-amber-400 light:text-amber-600">★ First solve</div>
                    </div>
                </div>

                <button
                    id="undo-btn"
                    type="button"
                    class="mt-auto w-full rounded-xl border border-amber-700/50 bg-amber-900/30 px-4 py-4 text-base font-semibold text-amber-300 hover:bg-amber-900/60 disabled:cursor-not-allowed disabled:opacity-50 light:border-amber-300 light:bg-amber-100 light:text-amber-800 light:hover:bg-amber-200"
                >
                    Undo (<span id="undo-count">5</span>s)
                </button>

                <button
                    id="redo-btn"
                    type="button"
                    class="mt-auto hidden w-full rounded-xl border border-emerald-700/50 bg-emerald-900/30 px-4 py-4 text-base font-semibold text-emerald-300 hover:bg-emerald-900/60 light:border-emerald-300 light:bg-emerald-100 light:text-emerald-800 light:hover:bg-emerald-200"
                >
                    Mark delivered
                </button>
            </div>
        </main>

        <script>
            (function () {
                const params = new URLSearchParams(location.search);
                const id = params.get("id");

                const loadingEl = document.getElementById("loading");
                const errorEl = document.getElementById("error");
                const errorTitleEl = document.getElementById("error-title");
                const errorDetailEl = document.getElementById("error-detail");
                const ticketEl = document.getElementById("ticket");
                const statusCardEl = document.getElementById("status-card");
                const statusIconEl = document.getElementById("status-icon");
                const statusTitleEl = document.getElementById("status-title");
                const statusSubEl = document.getElementById("status-sub");
                const circleEl = document.getElementById("balloon-circle");
                const problemNameEl = document.getElementById("problem-name");
                const teamNameEl = document.getElementById("team-name");
                const firstSolveEl = document.getElementById("first-solve-tag");
                const undoBtn = document.getElementById("undo-btn");
                const redoBtn = document.getElementById("redo-btn");

                function showError(title, detail) {
                    loadingEl.classList.add("hidden");
                    ticketEl.classList.add("hidden");
                    errorEl.classList.remove("hidden");
                    errorEl.classList.add("flex");
                    errorTitleEl.textContent = title;
                    errorDetailEl.textContent = detail || "";
                }

                async function call(method, body) {
                    const r = await fetch(
                        "/balloons.v1.BalloonService/" + method,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body),
                        },
                    );
                    if (!r.ok) {
                        const t = await r.text();
                        throw new Error(method + " HTTP " + r.status + ": " + t);
                    }
                    return r.json();
                }

                function colorForRGB(rgb) {
                    if (!rgb) return "#888";
                    return rgb;
                }

                function setStatusDelivered() {
                    statusCardEl.className =
                        "mb-6 rounded-2xl border border-emerald-700/50 bg-emerald-900/30 px-5 py-6 text-center text-emerald-200 light:border-emerald-300 light:bg-emerald-100 light:text-emerald-800";
                    statusIconEl.textContent = "✓";
                    statusTitleEl.textContent = "Delivered!";
                    statusSubEl.textContent = "DOMjudge will be updated shortly.";
                }

                function setStatusCancelled() {
                    statusCardEl.className =
                        "mb-6 rounded-2xl border border-zinc-700 bg-zinc-800/40 px-5 py-6 text-center text-zinc-200 light:border-zinc-300 light:bg-zinc-100 light:text-zinc-700";
                    statusIconEl.textContent = "↶";
                    statusTitleEl.textContent = "Cancelled";
                    statusSubEl.textContent = "Tap below if you do want to mark it.";
                }

                function setStatusAlready() {
                    statusCardEl.className =
                        "mb-6 rounded-2xl border border-zinc-700 bg-zinc-800/40 px-5 py-6 text-center text-zinc-200 light:border-zinc-300 light:bg-zinc-100 light:text-zinc-700";
                    statusIconEl.textContent = "✓";
                    statusTitleEl.textContent = "Already delivered";
                    statusSubEl.textContent = "Nothing to do.";
                }

                function setStatusError(msg) {
                    statusCardEl.className =
                        "mb-6 rounded-2xl border border-red-700/50 bg-red-900/30 px-5 py-6 text-center text-red-200 light:border-red-300 light:bg-red-100 light:text-red-800";
                    statusIconEl.textContent = "⚠️";
                    statusTitleEl.textContent = "Mark failed";
                    statusSubEl.textContent = msg;
                }

                function fillBalloon(b) {
                    circleEl.style.background = colorForRGB(b.problemRgb);
                    circleEl.textContent = b.problemLabel || "?";
                    problemNameEl.textContent = "Problem " + (b.problemLabel || "?");
                    teamNameEl.textContent = b.teamName || "";
                    if (b.firstSolve) firstSolveEl.classList.remove("hidden");
                }

                async function markDone() {
                    try {
                        await call("MarkDone", { balloonId: id });
                    } catch (err) {
                        console.error("MarkDone:", err);
                        setStatusError(String(err.message || err));
                        undoBtn.classList.add("hidden");
                        redoBtn.classList.remove("hidden");
                        redoBtn.textContent = "Retry";
                    }
                }

                // Connect-protocol JSON encodes int64 as a string; the proto Balloon.id
                // is int64 so list responses come back with id as a string. Compare as
                // strings.
                async function start() {
                    if (!id) {
                        showError("Missing balloon id", "The scan URL is malformed.");
                        return;
                    }

                    let list;
                    try {
                        list = await call("ListBalloons", {});
                    } catch (err) {
                        console.error("ListBalloons:", err);
                        showError("Couldn't reach the server", String(err.message || err));
                        return;
                    }

                    const balloons = list.balloons || [];
                    const b = balloons.find(
                        (x) => String(x.id) === String(id),
                    );
                    if (!b) {
                        showError("Ticket not recognized", "Balloon #" + id + " isn't in the current contest view. It may have been hidden by a filter, or this ticket is from a previous contest.");
                        return;
                    }

                    loadingEl.classList.add("hidden");
                    ticketEl.classList.remove("hidden");
                    ticketEl.classList.add("flex");
                    fillBalloon(b);

                    if (b.done) {
                        setStatusAlready();
                        undoBtn.classList.add("hidden");
                        redoBtn.classList.add("hidden");
                        return;
                    }

                    setStatusDelivered();
                    runCountdown();
                }

                let timerId = null;
                function runCountdown() {
                    undoBtn.classList.remove("hidden");
                    redoBtn.classList.add("hidden");
                    let remaining = 5;
                    const countEl = document.getElementById("undo-count");
                    if (countEl) countEl.textContent = String(remaining);
                    timerId = setInterval(() => {
                        remaining--;
                        if (remaining <= 0) {
                            clearInterval(timerId);
                            timerId = null;
                            undoBtn.disabled = true;
                            undoBtn.textContent = "Marking…";
                            markDone().finally(() => {
                                undoBtn.classList.add("hidden");
                                undoBtn.disabled = false;
                            });
                        } else {
                            const c = document.getElementById("undo-count");
                            if (c) c.textContent = String(remaining);
                        }
                    }, 1000);
                }

                undoBtn.onclick = () => {
                    if (timerId) {
                        clearInterval(timerId);
                        timerId = null;
                    }
                    setStatusCancelled();
                    undoBtn.classList.add("hidden");
                    redoBtn.classList.remove("hidden");
                };

                redoBtn.onclick = () => {
                    setStatusDelivered();
                    undoBtn.disabled = false;
                    undoBtn.innerHTML = 'Undo (<span id="undo-count">5</span>s)';
                    runCountdown();
                };

                start();
            })();
        </script>
    </body>
</html>
