<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Balloon Tracker</title>
        <link rel="stylesheet" href="/dist/styles.css" />
        <script>
            (function () {
                try {
                    if (localStorage.getItem("theme") === "light") {
                        document.documentElement.classList.add("light");
                    }
                } catch (_) {}
            })();
        </script>
    </head>
    <body
        class="min-h-screen bg-zinc-950 text-zinc-100 light:bg-zinc-50 light:text-zinc-900"
    >
        <header
            class="flex items-center justify-between border-b border-zinc-800 px-6 py-4 light:border-zinc-200"
        >
            <h1 class="flex items-center gap-2 text-lg font-bold">
                <span>🎈</span><span>Balloon Tracker</span>
            </h1>
            <div class="flex items-center gap-4">
                <div
                    id="status"
                    class="flex items-center gap-2 text-sm text-zinc-400 light:text-zinc-600"
                >
                    <span
                        id="status-dot"
                        class="h-2 w-2 rounded-full bg-zinc-500"
                    ></span>
                    <span id="status-text">Connecting…</span>
                </div>
                <button
                    id="theme-toggle"
                    type="button"
                    title="Toggle light/dark mode"
                    aria-label="Toggle light/dark mode"
                    class="rounded-md border border-zinc-700 bg-zinc-800/60 px-2 py-1 text-sm hover:bg-zinc-800 light:border-zinc-300 light:bg-white light:hover:bg-zinc-100"
                >
                    <span id="theme-toggle-icon">☀️</span>
                </button>
            </div>
        </header>

        <main class="mx-auto max-w-5xl px-6 py-8">
            <div
                id="freeze-banner"
                class="mb-6 hidden rounded-lg border border-sky-700/50 bg-sky-900/30 px-4 py-3 text-sm font-medium text-sky-200 light:border-sky-300 light:bg-sky-100 light:text-sky-800"
            >
                🧊 Scoreboard is frozen — keep delivering balloons, new results
                won't be published until end of contest.
            </div>

            <form
                id="scan-form"
                class="mb-6 flex items-center gap-3 rounded-lg border border-zinc-800 bg-zinc-900/40 px-4 py-3 light:border-zinc-200 light:bg-white"
                autocomplete="off"
            >
                <label
                    for="scan-input"
                    class="shrink-0 text-sm font-semibold tracking-wider text-zinc-300 light:text-zinc-700"
                >
                    SCAN
                </label>
                <input
                    id="scan-input"
                    name="scan"
                    type="text"
                    inputmode="none"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    placeholder="Scan a balloon ticket (or type id and press Enter)"
                    class="flex-1 rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 light:border-zinc-300 light:bg-zinc-50 light:text-zinc-900 light:placeholder:text-zinc-400"
                />
                <span
                    id="scan-hint"
                    class="hidden shrink-0 text-xs text-zinc-500 light:text-zinc-400"
                ></span>
            </form>

            <div
                id="toast-stack"
                class="fixed right-6 top-6 z-50 flex w-80 flex-col gap-2"
            ></div>

            <section class="mb-10">
                <h2
                    class="mb-3 text-sm font-semibold tracking-wider text-zinc-300 light:text-zinc-700"
                >
                    PENDING
                    <span
                        id="pending-count"
                        class="text-zinc-500 light:text-zinc-400"
                        >(0)</span
                    >
                </h2>
                <div id="pending" class="flex flex-col gap-3"></div>
                <p
                    id="pending-empty"
                    class="hidden text-sm italic text-zinc-500 light:text-zinc-400"
                >
                    No pending balloons
                </p>
            </section>

            <section>
                <h2
                    class="mb-3 text-sm font-semibold tracking-wider text-zinc-300 light:text-zinc-700"
                >
                    DELIVERED
                    <span
                        id="delivered-count"
                        class="text-zinc-500 light:text-zinc-400"
                        >(0)</span
                    >
                </h2>
                <div id="delivered" class="flex flex-col gap-3"></div>
                <p
                    id="delivered-empty"
                    class="text-sm italic text-zinc-500 light:text-zinc-400"
                >
                    No delivered balloons yet
                </p>
            </section>
        </main>

        <script type="module" src="/dist/app.js"></script>
    </body>
</html>
